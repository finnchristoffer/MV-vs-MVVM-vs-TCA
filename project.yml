name: TCA-iOS
options:
  bundleIdPrefix: com.finnchristoffer.tcaios
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
packages:
  ComposableArchitecture:
    url: https://github.com/pointfreeco/swift-composable-architecture
    from: 1.15.0
  Dependencies:
    url: https://github.com/pointfreeco/swift-dependencies
    from: 1.4.0
  CasePaths:
    url: https://github.com/pointfreeco/swift-case-paths
    from: 1.5.4
  Clocks:
    url: https://github.com/pointfreeco/swift-clocks
    from: 1.0.4
  Perception:
    url: https://github.com/pointfreeco/swift-perception
    from: 2.0.10
  SwiftSyntax:
    url: https://github.com/swiftlang/swift-syntax
    exactVersion: 603.0.1
  SwiftNavigation:
    path: Packages/swift-navigation
targets:
  MVVMApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Shared
      - path: MVVM
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.finnchristoffer.tcaios.mvvm
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
  MVApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Shared
      - path: MV
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.finnchristoffer.tcaios.mv
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
  TCAApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Shared
      - path: TCA
    dependencies:
      - package: ComposableArchitecture
      - package: Dependencies
      - package: CasePaths
        product: CasePathsCore
      - package: Clocks
      - package: Perception
        product: PerceptionCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.finnchristoffer.tcaios.tca
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
  MVVMTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MVVMTests
    dependencies:
      - target: MVVMApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
  MVTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MVTests
    dependencies:
      - target: MVApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
  TCATests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TCATests
    dependencies:
      - target: TCAApp
      - package: ComposableArchitecture
      - package: Dependencies
      - package: CasePaths
        product: CasePathsCore
      - package: Clocks
      - package: Perception
        product: PerceptionCore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
schemes:
  MVVMApp:
    build:
      targets:
        MVVMApp: all
        MVVMTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - MVVMTests
  MVApp:
    build:
      targets:
        MVApp: all
        MVTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - MVTests
  TCAApp:
    build:
      targets:
        TCAApp: all
        TCATests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - TCATests
